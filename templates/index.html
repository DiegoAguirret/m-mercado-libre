<!DOCTYPE html>
<html>
<head>
    <title>Diego Aguirre - Mercado Libre Mini 2026</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; max-width: 1200px; margin: auto; }
        .producto { border: 1px solid #ddd; margin: 10px; padding: 20px; display: inline-block; width: 200px; }
        .precio { font-size: 24px; color: green; font-weight: bold; }
        form { margin: 20px 0; }
        input { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🛒 Mercado Libre Mini</h1>
    
    <form method="post" action="/agregar">
        <input name="nombre" placeholder="Nombre producto" required>
        <input name="precio" type="number" placeholder="Precio S/" required>
        <input name="imagen" placeholder="imagen.jpg" required>        
        <button>Agregar Producto</button>
    </form>
    
    <div>
        {% for p in productos %}
        <div class="producto">
            <img src="{{ p.imagen if p.imagen.startswith('http') else '/static/' + p.imagen }}" height="120" width="130" onerror="this.src='https://via.placeholder.com/150?text=No+Imagen'">
            <h3>{{ p.nombre }}</h3>
            <div class="precio">S/ {{ "%.2f"|format(p.precio) }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
